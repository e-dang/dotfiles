# Combined Open WebUI + SearXNG stack.
# Project name and container names are distinct from the standalone
# ~/.searxng/docker-compose.yml so both can coexist while testing (though
# host ports collide, so only one stack should be up at a time).

name: local-ai

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    ports:
      - "127.0.0.1:8095:8080"
    volumes:
      - ${HOME}/.local/share/open-webui:/app/backend/data
    environment:
      - WEBUI_SECRET_KEY=${OPEN_WEBUI_SECRET_KEY}

  searxng:
    image: docker.io/searxng/searxng:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:8080"
    env_file: ./.env
    volumes:
      - ./core-config/:/etc/searxng/:Z
      - searxng-data:/var/cache/searxng/
    depends_on:
      - valkey

  valkey:
    image: docker.io/valkey/valkey:9-alpine
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    volumes:
      - valkey-data:/data/

volumes:
  searxng-data:
  valkey-data:
